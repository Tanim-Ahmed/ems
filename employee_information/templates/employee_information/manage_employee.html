<div class="container-fluid">
    <form action="" id="employee-form">
        {% csrf_token %}

        <input type="hidden" name="id"
               value="{% if employee.pk %}{{ employee.pk }}{% endif %}">

        <div class="row">

            <!-- Personnel Information -->
            <div class="col-md-6">

                <h5 class="mb-3">Personnel Information</h5>

                <div class="form-group mb-3">
                    <label>Employee ID / Bio ID</label>
                    <input type="text" name="code"
                           class="form-control form-control-sm"
                           value="{% if employee.code %}{{ employee.code }}{% endif %}"
                           required>
                </div>

                <div class="form-group mb-3">
                    <label>First Name</label>
                    <input type="text" name="firstname"
                           class="form-control form-control-sm"
                           value="{% if employee.firstname %}{{ employee.firstname }}{% endif %}"
                           required>
                </div>

                <div class="form-group mb-3">
                    <label>Middle Name</label>
                    <input type="text" name="middlename"
                           class="form-control form-control-sm"
                           value="{% if employee.middlename %}{{ employee.middlename }}{% endif %}">
                </div>

                <div class="form-group mb-3">
                    <label>Last Name</label>
                    <input type="text" name="lastname"
                           class="form-control form-control-sm"
                           value="{% if employee.lastname %}{{ employee.lastname }}{% endif %}"
                           required>
                </div>

                <div class="form-group mb-3">
                    <label>Gender</label>
                    <select name="gender" class="form-select form-select-sm">
                        <option value="Male"
                            {% if employee.gender == 'Male' %}selected{% endif %}>
                            Male
                        </option>
                        <option value="Female"
                            {% if employee.gender == 'Female' %}selected{% endif %}>
                            Female
                        </option>
                    </select>
                </div>

                <div class="form-group mb-3">
                    <label>Date of Birth</label>
                    <input type="date"
                           name="dob"
                           class="form-control form-control-sm"
                           value="{% if employee.dob %}{{ employee.dob|date:'Y-m-d' }}{% endif %}">
                </div>

                <div class="form-group mb-3">
                    <label>Email</label>
                    <input type="email"
                           name="email"
                           class="form-control form-control-sm"
                           value="{% if employee.email %}{{ employee.email }}{% endif %}">
                </div>

                <div class="form-group mb-3">
                    <label>Contact Number</label>
                    <input type="text"
                           name="contact"
                           class="form-control form-control-sm"
                           value="{% if employee.contact %}{{ employee.contact }}{% endif %}">
                </div>

                <div class="form-group mb-3">
                    <label>Address</label>
                    <textarea name="address"
                              rows="3"
                              class="form-control form-control-sm">{% if employee.address %}{{ employee.address }}{% endif %}</textarea>
                </div>

                <div class="form-group mb-3">
                    <label>Department</label>
                    <select name="department_id"
                            class="form-select form-select-sm"
                            required>
                        <option value="">Select Department</option>
                        {% for department in departments %}
                        <option value="{{ department.id }}"
                            {% if employee.department_id.id == department.id %}selected{% endif %}>
                            {{ department.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group mb-3">
                    <label>Position</label>
                    <select name="position_id"
                            class="form-select form-select-sm"
                            required>
                        <option value="">Select Position</option>
                        {% for position in positions %}
                        <option value="{{ position.id }}"
                            {% if employee.position_id.id == position.id %}selected{% endif %}>
                            {{ position.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group mb-3">
                    <label>Date Hired</label>
                    <input type="date"
                           name="date_hired"
                           class="form-control form-control-sm"
                           value="{% if employee.date_hired %}{{ employee.date_hired|date:'Y-m-d' }}{% endif %}">
                </div>

                <div class="form-group mb-3">
                    <label>Salary</label>
                    <input type="number"
                           step="0.01"
                           name="salary"
                           class="form-control form-control-sm"
                           value="{{ employee.salary|default:'' }}">
                </div>

            </div>

            <!-- Training Information -->
            <div class="col-md-6">

                <h5 class="mb-3">Training Information</h5>

                <div class="form-group mb-2">
                    <label>Safety Training Hours</label>
                    <input type="number" step="0.01"
                           name="safety_training_hours"
                           class="form-control form-control-sm"
                           value="{{ employee.safety_training_hours|default:'' }}">
                </div>

                <div class="form-group mb-2">
                    <label>Technical Training Hours</label>
                    <input type="number" step="0.01"
                           name="technical_training_hours"
                           class="form-control form-control-sm"
                           value="{{ employee.technical_training_hours|default:'' }}">
                </div>

                <div class="form-group mb-2">
                    <label>PRA Training Hours</label>
                    <input type="number" step="0.01"
                           name="pra_training_hours"
                           class="form-control form-control-sm"
                           value="{{ employee.pra_training_hours|default:'' }}">
                </div>

                <div class="form-group mb-2">
                    <label>OJT Training Hours</label>
                    <input type="number" step="0.01"
                           name="ojt_training_hours"
                           class="form-control form-control-sm"
                           value="{{ employee.ojt_training_hours|default:'' }}">
                </div>

                <div class="form-group mb-2">
                    <label>Total Hour</label>
                    <input type="number" step="0.01"
                           name="total_hour"
                           id="total_hour"
                           class="form-control form-control-sm"
                           value="{{ employee.total_hour|default:'' }}">
                </div>

                <hr>

                <div class="form-group mb-2">
                    <label>Safety Training Start Date</label>
                    <input type="date" name="safety_training_start_date"
                           class="form-control form-control-sm"
                           value="{% if employee.safety_training_start_date %}{{ employee.safety_training_start_date|date:'Y-m-d' }}{% endif %}">
                </div>

                <div class="form-group mb-2">
                    <label>Safety Training End Date</label>
                    <input type="date" name="safety_training_end_date"
                           class="form-control form-control-sm"
                           value="{% if employee.safety_training_end_date %}{{ employee.safety_training_end_date|date:'Y-m-d' }}{% endif %}">
                </div>

                <div class="form-group mb-2">
                    <label>Technical Training Start Date</label>
                    <input type="date" name="technical_training_start_date"
                           class="form-control form-control-sm"
                           value="{% if employee.technical_training_start_date %}{{ employee.technical_training_start_date|date:'Y-m-d' }}{% endif %}">
                </div>

                <div class="form-group mb-2">
                    <label>Technical Training End Date</label>
                    <input type="date" name="technical_training_end_date"
                           class="form-control form-control-sm"
                           value="{% if employee.technical_training_end_date %}{{ employee.technical_training_end_date|date:'Y-m-d' }}{% endif %}">
                </div>

                <div class="form-group mb-2">
                    <label>PRA Training Start Date</label>
                    <input type="date" name="pra_training_start_date"
                           class="form-control form-control-sm"
                           value="{% if employee.pra_training_start_date %}{{ employee.pra_training_start_date|date:'Y-m-d' }}{% endif %}">
                </div>

                <div class="form-group mb-2">
                    <label>PRA Training End Date</label>
                    <input type="date" name="pra_training_end_date"
                           class="form-control form-control-sm"
                           value="{% if employee.pra_training_end_date %}{{ employee.pra_training_end_date|date:'Y-m-d' }}{% endif %}">
                </div>

                <div class="form-group mb-2">
                    <label>OJT Training Start Date</label>
                    <input type="date" name="ojt_training_start_date"
                           class="form-control form-control-sm"
                           value="{% if employee.ojt_training_start_date %}{{ employee.ojt_training_start_date|date:'Y-m-d' }}{% endif %}">
                </div>

                <div class="form-group mb-2">
                    <label>OJT Training End Date</label>
                    <input type="date" name="ojt_training_end_date"
                           class="form-control form-control-sm"
                           value="{% if employee.ojt_training_end_date %}{{ employee.ojt_training_end_date|date:'Y-m-d' }}{% endif %}">
                </div>

                <div class="form-group mb-2">
                    <label>Total Completion Hour</label>
                    <input type="number"
                           step="0.01"
                           name="total_completion_hour"
                           id="total_completion_hour"
                           class="form-control form-control-sm"
                           value="{{ employee.total_completion_hour|default:'' }}">
                </div>

                <div class="form-group mb-2">
                    <label>Training Need To Complete</label>
                    <input type="number"
                           step="0.01"
                           name="training_need_to_completed"
                           id="training_need_to_completed"
                           class="form-control form-control-sm"
                           readonly
                           value="{{ employee.training_need_to_completed|default:'' }}">
                </div>

                <div class="form-group mb-3">
                    <label>Status</label>
                    <select name="status" class="form-select form-select-sm">
                        <option value="1" {% if employee.status == 1 %}selected{% endif %}>Active</option>
                        <option value="0" {% if employee.status == 0 %}selected{% endif %}>Inactive</option>
                    </select>
                </div>

            </div>

        </div>

        <hr>

        <div class="text-end">
            <button type="submit" class="btn btn-primary">
                Save Employee
            </button>
        </div>

    </form>
</div>

<script>
$(function(){

    function calculateTrainingNeed(){

        let totalHour = parseFloat($('#total_hour').val()) || 0;
        let completedHour = parseFloat($('#total_completion_hour').val()) || 0;

        let remaining = totalHour - completedHour;

        if(remaining < 0){
            remaining = 0;
        }

        $('#training_need_to_completed').val(remaining.toFixed(2));
    }

    $('#total_hour,#total_completion_hour').on('keyup change', function(){
        calculateTrainingNeed();
    });

    calculateTrainingNeed();

    $('#employee-form').submit(function(e){

        e.preventDefault();

        start_loader();

        $.ajax({
            url: "{% url 'save-employee-page' %}",
            method: "POST",
            data: $(this).serialize(),
            dataType: "json",

            success: function(resp){

                if(resp.status == 'success'){

                    alert("Employee saved successfully.");

                    location.reload();

                }else{

                    alert(resp.msg || "Failed to save employee.");
                }

                end_loader();
            },

            error: function(xhr){

                console.log(xhr.responseText);
                alert("Server Error. Check Django console.");
                end_loader();
            }
        });

    });

});
</script>
